<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог</title>

    <!-- Подключение шрифта Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Подключение CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Главная</a></li>
                <li><a href="blog.html" class="nav-link active">Блог</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <h1 class="page-title">Статьи</h1>

        <div class="blog-grid" id="blog-grid">
            <!-- Лоадер (показывается при загрузке) -->
            <div class="loader-container" id="loader-container">
                <div class="loader"></div>
                <p class="loader-text">Загрузка статей...</p>
            </div>

            <!-- Состояние "нет статей" (скрыто по умолчанию) -->
            <div class="empty-state" id="empty-state" hidden>
                <p class="empty-state-text">Нет статей</p>
                <button class="btn-create-first" id="btn-create-first">Создать первую статью</button>
            </div>
        </div>

        <!-- Боковая админ-панель -->
        <aside class="admin-sidebar">
            <button class="admin-btn" id="btn-create-post" title="Создать статью">
                <span class="btn-icon">✎</span>
                <span class="btn-text">Создать статью</span>
            </button>
            <button class="admin-btn" id="btn-show-stats" title="Показать статистику">
                <span class="btn-icon">📊</span>
                <span class="btn-text">Статистика</span>
            </button>
        </aside>

        <!-- Форма добавления статьи (скрыта по умолчанию) -->
        <div class="post-form-overlay" id="post-form-overlay">
            <form class="post-form" id="post-form">
                <h3>Новая статья</h3>

                <label for="post-title">Заголовок</label>
                <input type="text" id="post-title" name="title" placeholder="Введите заголовок статьи" required>

                <label for="post-content">Текст статьи</label>
                <textarea id="post-content" name="content" placeholder="Напишите содержание статьи..." rows="5"
                          required></textarea>

                <div class="form-buttons">
                    <button type="submit" class="btn-submit">Добавить</button>
                    <button type="button" class="btn-cancel" id="btn-cancel-form">Отмена</button>
                </div>
            </form>
        </div>

        <!-- Dialog со статистикой -->
        <dialog class="stats-dialog" id="stats-dialog">
            <div class="dialog-header">
                <h3>Статистика блога</h3>
                <button class="dialog-close" id="btn-close-stats">&times;</button>
            </div>
            <div class="dialog-content">
                <p><strong>Всего статей:</strong> <span id="stats-count">5</span></p>
                <p><strong>Последнее обновление:</strong> <span id="stats-date">12 марта 2026</span></p>
            </div>
        </dialog>
    </main>

    <footer class="footer">
        <div class="container">
            <h2>Контакты</h2>
            <p><a href="mailto:repkin@mail.bebebe">repkin@mail.bebebe</a></p>
            <p><a href="tel:88005553535">8 (800) 555-35-35</a></p>
        </div>
    </footer>

    <!-- Подключение JavaScript -->
    <script src="script.js" defer></script>
</body>

</html>
